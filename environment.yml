name: digital-twin
channels:
  - conda-forge
  - defaults
dependencies:
  # Python dependencies
  - python=3.12
  - pandas=2.2.0
  - python-dotenv=1.0.0
  - psycopg2=2.9.9
  - sqlalchemy=2.0
  - jupyter=1.0.0
  - notebook=7.1.0
  - pip
  # R dependencies
  - r-base=4.3
  - r-dbi
  - r-rpostgres
  - r-readr
  - r-dplyr
  - r-jsonlite
  - r-dotenv
  - r-r6
  - r-devtools
  - r-httr
  - r-rmarkdown
  - r-knitr
  - pandoc
  # Python packages via pip
  - pip:
      - pyproj>=3.4.0
      - supabase==2.26.0
      - pygbif>=0.6.0 # GBIF API for species name validation
