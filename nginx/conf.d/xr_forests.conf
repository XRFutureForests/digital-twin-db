server {
    listen 80;
    server_name localhost;

    # API routes - proxy to FastAPI
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Support for large API requests (point cloud metadata)
        client_max_body_size 100M;
        proxy_request_buffering off;
    }

    # Point cloud file uploads - handle large files efficiently
    location /uploads/ {
        alias /var/uploads/;
        
        # Large file upload settings
        client_max_body_size 2G;
        client_body_temp_path /var/uploads/temp;
        
        # Upload progress tracking
        upload_progress uploads 1m;
    }

    # Point cloud file downloads - serve static files with caching
    location /pointclouds/ {
        alias /usr/share/nginx/html/pointclouds/;
        
        # Caching for point cloud files
        expires 1d;
        add_header Cache-Control "public, immutable";
        
        # Support range requests for large files
        location ~* \.(las|laz|ply|pcd)$ {
            add_header Accept-Ranges bytes;
        }
    }

    # Web applications - serve static content
    location /web/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Field Web App - QR code scanning interface
    location /field/ {
        alias /usr/share/nginx/html/field/;
        index index.html;
        try_files $uri $uri/ /field/index.html;
    }

    # 3DTrees Web Platform - point cloud visualization
    location /3dtrees/ {
        alias /usr/share/nginx/html/3dtrees/;
        index index.html;
        try_files $uri $uri/ /3dtrees/index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Default route - redirect to web interface
    location / {
        return 301 /web/;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
